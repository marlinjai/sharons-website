name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          HTTP_CODE=$(curl -s -o /tmp/coolify-response -w "%{http_code}" \
            "${{ secrets.COOLIFY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Coolify deploy webhook failed with HTTP $HTTP_CODE"
            cat /tmp/coolify-response
            exit 1
          fi
          echo "Coolify deploy triggered (HTTP $HTTP_CODE)"
